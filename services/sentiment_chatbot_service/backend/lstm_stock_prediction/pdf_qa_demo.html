<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Report Q&A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .example-questions {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .example-questions h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .example-btn {
            background: #e9ecef;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #questionInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        #questionInput:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #askButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #askButton:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        #askButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .response-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .response-container.active {
            display: block;
        }
        
        .question-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .answer {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .metadata {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
            font-size: 13px;
            color: #6c757d;
        }
        
        .metadata-item {
            display: inline-block;
            margin-right: 15px;
        }
        
        .error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Annual Report Q&A</h1>
        <p class="subtitle">Ask questions about the Annual Report and get AI-powered answers</p>
        
        <div class="example-questions">
            <h3>💡 Example Questions (Click to try):</h3>
            <button class="example-btn" onclick="askExample('What was the total revenue in 2024?')">Revenue 2024</button>
            <button class="example-btn" onclick="askExample('What are the strategic objectives?')">Strategic Goals</button>
            <button class="example-btn" onclick="askExample('How many employees does the company have?')">Employee Count</button>
            <button class="example-btn" onclick="askExample('What are the main risk factors?')">Risk Factors</button>
            <button class="example-btn" onclick="askExample('What are the future growth plans?')">Growth Plans</button>
        </div>
        
        <div class="input-group">
            <input 
                type="text" 
                id="questionInput" 
                placeholder="Type your question here..." 
                onkeypress="handleKeyPress(event)"
            />
            <button id="askButton" onclick="askQuestion()">Ask</button>
        </div>
        
        <div class="loading" id="loadingIndicator">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #667eea;">Generating answer...</p>
        </div>
        
        <div class="response-container" id="responseContainer">
            <div class="question-label">Question:</div>
            <div id="questionDisplay" style="margin-bottom: 15px; color: #333;"></div>
            
            <div class="question-label">Answer:</div>
            <div class="answer" id="answerDisplay"></div>
            
            <div class="metadata" id="metadataDisplay"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000/api/pdf-rag/ask';
        
        function askExample(question) {
            document.getElementById('questionInput').value = question;
            askQuestion();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                askQuestion();
            }
        }
        
        async function askQuestion() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();
            
            if (!question) {
                alert('Please enter a question');
                return;
            }
            
            // Disable button and show loading
            const askButton = document.getElementById('askButton');
            askButton.disabled = true;
            document.getElementById('loadingIndicator').classList.add('active');
            document.getElementById('responseContainer').classList.remove('active');
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        n_results: 5,
                        model: 'llama3.2:latest',
                        show_context: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Display response
                document.getElementById('questionDisplay').textContent = data.question;
                document.getElementById('answerDisplay').textContent = data.answer;
                
                // Display metadata
                const metadata = `
                    <span class="metadata-item">📊 Chunks: ${data.chunks_found}</span>
                    <span class="metadata-item">🤖 Model: ${data.model}</span>
                    ${data.duration ? `<span class="metadata-item">⏱️ ${data.duration.toFixed(2)}s</span>` : ''}
                `;
                document.getElementById('metadataDisplay').innerHTML = metadata;
                
                // Show response
                const responseContainer = document.getElementById('responseContainer');
                responseContainer.classList.add('active');
                responseContainer.classList.remove('error');
                
            } catch (error) {
                console.error('Error:', error);
                
                // Show error
                document.getElementById('questionDisplay').textContent = question;
                document.getElementById('answerDisplay').textContent = 
                    `Error: ${error.message}\n\nMake sure:\n1. Backend server is running (uvicorn)\n2. Ollama is running\n3. PDF index exists`;
                document.getElementById('metadataDisplay').innerHTML = '';
                
                const responseContainer = document.getElementById('responseContainer');
                responseContainer.classList.add('active', 'error');
            } finally {
                // Re-enable button and hide loading
                askButton.disabled = false;
                document.getElementById('loadingIndicator').classList.remove('active');
            }
        }
        
        // Test connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('http://localhost:8000/api/pdf-rag/health');
                const health = await response.json();
                console.log('PDF RAG Service Health:', health);
            } catch (error) {
                console.warn('Could not check service health:', error);
            }
        });
    </script>
</body>
</html>
